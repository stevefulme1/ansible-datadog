---
argument_specs:
  main:
    short_description: "Enable security monitoring rules"
    options:
      datadog_security_monitoring_host:
        description: Target host address
        type: str
        required: true
      datadog_security_monitoring_username:
        description: Authentication username
        type: str
      datadog_security_monitoring_password:
        description: Authentication password
        type: str
        no_log: true
      datadog_security_monitoring_api_key:
        description: API key for authentication
        type: str
        no_log: true
      datadog_security_monitoring_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      datadog_security_monitoring_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
