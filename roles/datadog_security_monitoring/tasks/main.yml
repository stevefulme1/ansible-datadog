---
# tasks/main.yml for datadog_security_monitoring
# Enable security monitoring rules

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - datadog_security_monitoring_host is defined
    fail_msg: "datadog_security_monitoring_host must be defined"
    quiet: true

- name: Execute datadog security monitoring
  ansible.builtin.debug:
    msg: >-
      Enable security monitoring rules.
      Target: {{ datadog_security_monitoring_host }}
