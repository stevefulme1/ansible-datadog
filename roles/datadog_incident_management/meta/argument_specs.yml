---
argument_specs:
  main:
    short_description: "Configure incident workflows and teams"
    options:
      datadog_incident_management_host:
        description: Target host address
        type: str
        required: true
      datadog_incident_management_username:
        description: Authentication username
        type: str
      datadog_incident_management_password:
        description: Authentication password
        type: str
      datadog_incident_management_api_key:
        description: API key for authentication
        type: str
      datadog_incident_management_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      datadog_incident_management_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
