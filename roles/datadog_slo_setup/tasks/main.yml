---
# tasks/main.yml for datadog_slo_setup
# Configure SLOs for critical services

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - datadog_slo_setup_host is defined
    fail_msg: "datadog_slo_setup_host must be defined"
    quiet: true

- name: Execute datadog slo setup
  ansible.builtin.debug:
    msg: >-
      Configure SLOs for critical services.
      Target: {{ datadog_slo_setup_host }}
