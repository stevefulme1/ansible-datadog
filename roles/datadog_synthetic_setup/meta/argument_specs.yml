---
argument_specs:
  main:
    short_description: "Create synthetic API and browser tests"
    options:
      datadog_synthetic_setup_host:
        description: Target host address
        type: str
        required: true
      datadog_synthetic_setup_username:
        description: Authentication username
        type: str
      datadog_synthetic_setup_password:
        description: Authentication password
        type: str
      datadog_synthetic_setup_api_key:
        description: API key for authentication
        type: str
      datadog_synthetic_setup_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      datadog_synthetic_setup_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
