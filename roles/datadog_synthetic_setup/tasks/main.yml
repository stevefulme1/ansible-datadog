---
# tasks/main.yml for datadog_synthetic_setup
# Create synthetic API and browser tests

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - datadog_synthetic_setup_host is defined
    fail_msg: "datadog_synthetic_setup_host must be defined"
    quiet: true

- name: Execute datadog synthetic setup
  ansible.builtin.debug:
    msg: >-
      Create synthetic API and browser tests.
      Target: {{ datadog_synthetic_setup_host }}
