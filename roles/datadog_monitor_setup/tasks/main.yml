---
# tasks/main.yml for datadog_monitor_setup
# Create standard monitoring coverage for a service

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - datadog_monitor_setup_host is defined
    fail_msg: "datadog_monitor_setup_host must be defined"
    quiet: true

- name: Execute datadog monitor setup
  ansible.builtin.debug:
    msg: >-
      Create standard monitoring coverage for a service.
      Target: {{ datadog_monitor_setup_host }}
