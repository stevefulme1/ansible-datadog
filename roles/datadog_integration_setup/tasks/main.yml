---
# tasks/main.yml for datadog_integration_setup
# Configure integrations (AWS, Azure, GCP)

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - datadog_integration_setup_host is defined
    fail_msg: "datadog_integration_setup_host must be defined"
    quiet: true

- name: Execute datadog integration setup
  ansible.builtin.debug:
    msg: >-
      Configure integrations (AWS, Azure, GCP).
      Target: {{ datadog_integration_setup_host }}
