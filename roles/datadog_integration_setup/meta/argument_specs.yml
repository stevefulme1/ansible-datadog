---
argument_specs:
  main:
    short_description: "Configure integrations (AWS, Azure, GCP)"
    options:
      datadog_integration_setup_host:
        description: Target host address
        type: str
        required: true
      datadog_integration_setup_username:
        description: Authentication username
        type: str
      datadog_integration_setup_password:
        description: Authentication password
        type: str
        no_log: true
      datadog_integration_setup_api_key:
        description: API key for authentication
        type: str
        no_log: true
      datadog_integration_setup_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      datadog_integration_setup_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
