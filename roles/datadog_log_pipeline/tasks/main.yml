---
# tasks/main.yml for datadog_log_pipeline
# Set up log collection and processing pipelines

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - datadog_log_pipeline_host is defined
    fail_msg: "datadog_log_pipeline_host must be defined"
    quiet: true

- name: Execute datadog log pipeline
  ansible.builtin.debug:
    msg: >-
      Set up log collection and processing pipelines.
      Target: {{ datadog_log_pipeline_host }}
