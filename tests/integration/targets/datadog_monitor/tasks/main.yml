---
# Integration tests for stevefulme1.datadog.datadog_monitor
# These tests require valid credentials configured in integration_config.yml

- name: Create monitor (check_mode)
  stevefulme1.datadog.datadog_monitor:
    host: "{{ datadog_host }}"
    api_key: "{{ datadog_api_key }}"
    app_key: "{{ datadog_app_key | default(omit) }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    monitor_type: metric alert
    query: "avg(last_5m):avg:system.cpu.user{*} > 90"
    validate_certs: "{{ validate_certs | default(true) }}"
  check_mode: true
  register: check_result

- name: Verify check_mode reports changed
  ansible.builtin.assert:
    that:
      - check_result is changed
      - check_result.diff is defined

- name: Create monitor
  stevefulme1.datadog.datadog_monitor:
    host: "{{ datadog_host }}"
    api_key: "{{ datadog_api_key }}"
    app_key: "{{ datadog_app_key | default(omit) }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    monitor_type: metric alert
    query: "avg(last_5m):avg:system.cpu.user{*} > 90"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: create_result

- name: Verify monitor was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.monitor is defined
      - create_result.monitor.id is defined

- name: Create monitor again (idempotency)
  stevefulme1.datadog.datadog_monitor:
    host: "{{ datadog_host }}"
    api_key: "{{ datadog_api_key }}"
    app_key: "{{ datadog_app_key | default(omit) }}"
    state: present
    name: "ansible-test-{{ resource_prefix }}"
    monitor_type: metric alert
    query: "avg(last_5m):avg:system.cpu.user{*} > 90"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: idem_result

- name: Verify idempotent create returns changed=false
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Delete monitor (check_mode)
  stevefulme1.datadog.datadog_monitor:
    host: "{{ datadog_host }}"
    api_key: "{{ datadog_api_key }}"
    app_key: "{{ datadog_app_key | default(omit) }}"
    state: absent
    monitor_id: "{{ create_result.monitor.id }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  check_mode: true
  register: delete_check

- name: Verify check_mode delete reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed

- name: Delete monitor
  stevefulme1.datadog.datadog_monitor:
    host: "{{ datadog_host }}"
    api_key: "{{ datadog_api_key }}"
    app_key: "{{ datadog_app_key | default(omit) }}"
    state: absent
    monitor_id: "{{ create_result.monitor.id }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: delete_result

- name: Verify monitor was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete monitor again (idempotent)
  stevefulme1.datadog.datadog_monitor:
    host: "{{ datadog_host }}"
    api_key: "{{ datadog_api_key }}"
    app_key: "{{ datadog_app_key | default(omit) }}"
    state: absent
    monitor_id: "{{ create_result.monitor.id }}"
    validate_certs: "{{ validate_certs | default(true) }}"
  register: delete_idem

- name: Verify idempotent delete returns changed=false
  ansible.builtin.assert:
    that:
      - delete_idem is not changed
