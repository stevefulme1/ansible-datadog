---
# Integration tests for stevefulme1.datadog.dashboard
#
# These tests verify full CRUD lifecycle with idempotency and check_mode.
# A live API endpoint is required.

- name: Set test variables
  ansible.builtin.set_fact:
    test_dashboard_params:


      data: "{{ test_data | default('test_data_value') }}"


      layout_type: "{{ test_layout_type | default('test_layout_type_value') }}"


      title: "{{ test_title | default('test_title_value') }}"


      widgets: "{{ test_widgets | default('test_widgets_value') }}"


# ============================================================
# CREATE - check mode
# ============================================================
- name: Create dashboard (check mode)
  stevefulme1.datadog.dashboard:

    state: present
  check_mode: true
  register: create_check

- name: Assert create in check mode reports changed
  ansible.builtin.assert:
    that:
      - create_check is changed
    fail_msg: "Create in check mode should report changed=true"

- name: Verify dashboard was NOT actually created (check mode)
  stevefulme1.datadog.dashboard_info:


    title: "{{ test_title | default('test_title_value') }}"


  register: check_verify

- name: Assert resource does not exist after check mode create
  ansible.builtin.assert:
    that:
      - check_verify.dashboards | length == 0
    fail_msg: "Resource should not exist after check mode create"

# ============================================================
# CREATE - real
# ============================================================
- name: Create dashboard
  stevefulme1.datadog.dashboard:

    state: present
  register: create_result

- name: Assert create reports changed
  ansible.builtin.assert:
    that:
      - create_result is changed
    fail_msg: "Create should report changed=true"

- name: Record created resource identifier
  ansible.builtin.set_fact:
    created_id: "{{ create_result.id }}"

# ============================================================
# CREATE - idempotency
# ============================================================
- name: Create dashboard again (idempotency)
  stevefulme1.datadog.dashboard:

    state: present
  register: create_idempotent

- name: Assert create is idempotent
  ansible.builtin.assert:
    that:
      - create_idempotent is not changed
    fail_msg: "Repeated create with same params should report changed=false"

# ============================================================
# READ - verify created resource
# ============================================================
- name: Get dashboard info
  stevefulme1.datadog.dashboard_info:
    id: "{{ created_id }}"
  register: info_result

- name: Assert resource exists and has expected data
  ansible.builtin.assert:
    that:
      - info_result.dashboards | length == 1


      - info_result.dashboards[0].data == test_dashboard_params.data


      - info_result.dashboards[0].layout_type == test_dashboard_params.layout_type


      - info_result.dashboards[0].title == test_dashboard_params.title


      - info_result.dashboards[0].widgets == test_dashboard_params.widgets


    fail_msg: "Created resource does not match expected values"

# ============================================================
# UPDATE
# ============================================================


- name: Update dashboard
  stevefulme1.datadog.dashboard:
    id: "{{ created_id }}"

    author_handle: "updated_author_handle_value"

    author_name: "updated_author_name_value"

    created_at: "updated_created_at_value"

    description: "updated_description_value"

    modified_at: "updated_modified_at_value"

    reflow_type: "updated_reflow_type_value"

    url: "updated_url_value"

    state: present
  register: update_result

- name: Assert update reports changed
  ansible.builtin.assert:
    that:
      - update_result is changed
    fail_msg: "Update should report changed=true"

# ============================================================
# UPDATE - idempotency
# ============================================================
- name: Update dashboard again (idempotency)
  stevefulme1.datadog.dashboard:
    id: "{{ created_id }}"

    author_handle: "updated_author_handle_value"

    author_name: "updated_author_name_value"

    created_at: "updated_created_at_value"

    description: "updated_description_value"

    modified_at: "updated_modified_at_value"

    reflow_type: "updated_reflow_type_value"

    url: "updated_url_value"

    state: present
  register: update_idempotent

- name: Assert update is idempotent
  ansible.builtin.assert:
    that:
      - update_idempotent is not changed
    fail_msg: "Repeated update with same params should report changed=false"


# ============================================================
# DELETE - check mode
# ============================================================
- name: Delete dashboard (check mode)
  stevefulme1.datadog.dashboard:
    id: "{{ created_id }}"
    state: absent
  check_mode: true
  register: delete_check

- name: Assert delete in check mode reports changed
  ansible.builtin.assert:
    that:
      - delete_check is changed
    fail_msg: "Delete in check mode should report changed=true"

- name: Verify dashboard still exists after check mode delete
  stevefulme1.datadog.dashboard_info:
    id: "{{ created_id }}"
  register: delete_check_verify

- name: Assert resource still exists after check mode delete
  ansible.builtin.assert:
    that:
      - delete_check_verify.dashboards | length == 1
    fail_msg: "Resource should still exist after check mode delete"

# ============================================================
# DELETE - real
# ============================================================
- name: Delete dashboard
  stevefulme1.datadog.dashboard:
    id: "{{ created_id }}"
    state: absent
  register: delete_result

- name: Assert delete reports changed
  ansible.builtin.assert:
    that:
      - delete_result is changed
    fail_msg: "Delete should report changed=true"

# ============================================================
# DELETE - idempotency
# ============================================================
- name: Delete dashboard again (idempotency)
  stevefulme1.datadog.dashboard:
    id: "{{ created_id }}"
    state: absent
  register: delete_idempotent

- name: Assert delete is idempotent
  ansible.builtin.assert:
    that:
      - delete_idempotent is not changed
    fail_msg: "Repeated delete should report changed=false"
