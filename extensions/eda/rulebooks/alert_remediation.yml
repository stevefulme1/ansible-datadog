---
- name: "Datadog Alert Remediation"
  hosts: all
  sources:
    - stevefulme1.datadog.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Critical alert - auto-remediate
      condition: >-
        event.datadog.severity is defined and
        event.datadog.severity == "critical"
      action:
        run_playbook:
          name: remediate.yml
          extra_vars:
            alert_host: "{{ event.datadog.host | default('') }}"
            alert_id: "{{ event.datadog.id | default('') }}"
            severity: "{{ event.datadog.severity }}"

    - name: Warning alert - notify
      condition: >-
        event.datadog.severity is defined and
        event.datadog.severity == "warning"
      action:
        print_event:
          pretty: true
